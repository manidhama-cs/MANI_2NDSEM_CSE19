<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Number Pattern Generator</title>

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    width: 300px;
  }

  .title {
    font-size: 22px;
    margin-bottom: 20px;
    color: #333;
  }

  .input-box {
    margin-bottom: 15px;
  }

  input {
    width: 80%;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
  }

  .btn {
    margin-top: 10px;
  }

  button {
    padding: 8px 15px;
    border: none;
    border-radius: 8px;
    background: #6c63ff;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  button:hover {
    background: #4e4acb;
  }

  .output-box {
    margin-top: 20px;
    padding: 15px;
    background: #f4f4f4;
    border-radius: 10px;
    min-height: 100px;
    font-family: monospace;
    white-space: pre;
    color: #222;
  }
</style>
</head>

<body>

<div class="container">
  <div class="title">Number Pattern Generator</div>

  <div class="input-box">
    <input type="number" id="num" placeholder="Enter N">
  </div>

  <div class="btn">
    <button onclick="generatePattern()">Generate</button>
  </div>

  <div class="output-box" id="output"></div>
</div>

<script>
function generatePattern() {
  let n = document.getElementById("num").value;
  let result = "";

  for (let i = 1; i <= n; i++) {
    for (let j = 1; j <= i; j++) {
      result += j;
    }
    result += "\n";
  }

  document.getElementById("output").textContent = result;
}
</script>

</body>
</html>
